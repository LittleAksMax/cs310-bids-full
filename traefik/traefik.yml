entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true # 301 redirect
  websecure:
    address: ":443"
    http:
      tls: {} # Enable TLS globally for all routers on this entrypoint

tls:
  certificates:
    - certFile: /etc/traefik/certs/localhost+2.pem
      keyFile: /etc/traefik/certs/localhost+2-key.pem

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

experimental:
  localPlugins:
    authheader:
      moduleName: github.com/LittleAksMax/traefik-plugin-authheader

api:
  dashboard: true
  insecure: true

log:
  level: DEBUG

accessLog: {}
