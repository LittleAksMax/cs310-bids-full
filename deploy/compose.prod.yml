services:
  traefik:
    image: traefik:3.6.7
    container_name: traefik
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/traefik.yml:/traefik.yml
      - ./traefik/dynamic:/etc/traefik/dynamic
      - ./traefik-plugin-authheader:/plugins-local/src/github.com/LittleAksMax/traefik-plugin-authheader
    env_file:
      - .env.shared
      - .env.traefik
    command:
      - --configFile=/traefik.yml
    depends_on:
      - auth_service
    networks:
      - bids_backend
  policy_db:
    container_name: policy_db
    hostname: policy_db
    image: mongo:8.0-noble
    ports:
      - "27017:27017"
    env_file:
      - .env.policy_db
    restart: on-failure
    volumes:
      - ./policy_db/data:/data/db
      - ./policy_db/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - bids_backend
  auth_db:
    container_name: auth_db
    hostname: auth_db
    image: postgres:17
    restart: always
    ports:
      - "5433:5432"
    env_file:
      - .env.auth_db
    volumes:
      - ./postgres/auth_db/data:/var/lib/postgresql/data
    networks:
      - bids_backend
  auth_service:
    image: mongo:8.0-noble
    hostname: auth_service
    container_name: auth_service
    env_file:
      - .env.auth_service
      - .env.shared
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      - auth_db
    networks:
      - bids_backend
  policy_service:
    build: ./policy-service
    hostname: policy_service
    container_name: policy_service
    env_file:
      - .env.policy_service
      - .env.shared
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - policy_db
      - policy_cache
    networks:
      - bids_backend
  policy_cache:
    container_name: policy_cache
    image: redis:alpine3.20
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - "./redis/policy_cache/redis.conf:/usr/local/etc/redis/redis.conf"
      - "./redis/policy_cache/log:/var/opt/redislabs/log"
      - "./redis/policy_cache/data:/data"
    ports:
      - "6379:6379"
    networks:
      - bids_backend
  users_cache:
    container_name: users_cache
    image: redis:alpine3.20
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - "./redis/users_cache/redis.conf:/usr/local/etc/redis/redis.conf"
      - "./redis/users_cache/log:/var/opt/redislabs/log"
      - "./redis/users_cache/data:/data"
    ports:
      - "6380:6379"
    networks:
      - bids_backend
  users_db:
    container_name: users_db
    hostname: users_db
    image: postgres:17
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - .env.users_db
    volumes:
      - ./postgres/users_db/data:/var/lib/postgresql/data
    networks:
      - bids_backend
  user_service:
    build: ./user-service
    hostname: user_service
    container_name: user_service
    env_file:
      - .env.user_service
      - .env.shared
    restart: unless-stopped
    ports:
      - "8083:8080"
    depends_on:
      - users_db
      - users_cache
    networks:
      - bids_backend
  bids_service:
    build: ./bids-service
    container_name: bids_service
    env_file:
      - .env.bids_service
      - .env.shared
    restart: unless-stopped
    depends_on:
      - user_service
      - policy_service
    networks:
      - bids_backend
  bidder_frontend:
    build: ./bidder-frontend
    container_name: bidder_frontend
    env_file:
      - .env.bidder_frontend
    restart: unless-stopped
    ports:
      - "81:81"
    depends_on:
      - user_service
      - policy_service
      - auth_service
      - traefik
    networks:
      - bids_frontend
networks:
  bids_backend:
    name: bids_backend
  bids_frontend:
    name: bids_frontend
