# ============================================================
# ports.yaml - Human-readable port configuration
# ============================================================
# Edit these values and re-apply with the generate script.
# "external" = the port exposed outside the cluster
# "internal" = the port the container listens on (don't change)
# ============================================================

traefik:
  external: 8080
  internal: 81

auth-service:
  external: 8082
  internal: 8080

policy-service:
  external: 8081
  internal: 8080

user-service:
  external: 8083
  internal: 8080

bids-service:
  internal: 8080 # no external port; only accessed by internal polling

bidder-frontend:
  external: 81
  internal: 81

auth-db:
  external: 5433
  internal: 5432

users-db:
  external: 5432
  internal: 5432

policy-db:
  external: 27017
  internal: 27017

policy-cache:
  external: 6379
  internal: 6379

users-cache:
  external: 6380
  internal: 6379
