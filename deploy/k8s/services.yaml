# Application services - Deployments + Services
# Images use ECR URIs with pinned version tags (never 'latest').
#
# Image placeholder format:
#   ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/bidder/<name>:<version>
# Replace these with actual values from values.yaml, or use envsubst.
---
# auth_service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: bidder
  labels:
    app: auth-service
    network: bids-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        network: bids-backend
    spec:
      imagePullSecrets:
        - name: ${ECR_PULL_SECRET}
      containers:
        - name: auth-service
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/bidder/auth-service:${AUTH_SERVICE_VERSION}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: auth-service-secret
            - configMapRef:
                name: shared-config
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: bidder
spec:
  selector:
    app: auth-service
  ports:
    - port: 8080
      targetPort: 8080

