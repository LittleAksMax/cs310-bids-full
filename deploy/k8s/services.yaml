# bids_service has no external Service (internal polling only)
# bidder_frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bidder-frontend
  namespace: bidder
  labels:
    app: bidder-frontend
    network: bids-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bidder-frontend
  template:
    metadata:
      labels:
        app: bidder-frontend
        network: bids-frontend
    spec:
      imagePullSecrets:
        - name: ${ECR_PULL_SECRET}
      containers:
        - name: bidder-frontend
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/bidder/bidder-frontend:${FRONTEND_VERSION}
          imagePullPolicy: Always
          ports:
            - containerPort: 81
          envFrom:
            - configMapRef:
                name: bidder-frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: bidder-frontend
  namespace: bidder
spec:
  type: NodePort
  selector:
    app: bidder-frontend
  ports:
    - port: 81
      targetPort: 81
      nodePort: 30081 # adjust in ports.yaml
