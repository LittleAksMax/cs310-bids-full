# Example: creating secrets from .env files.
# Each service gets its own Secret, created from the corresponding .env file.
#
# These are placeholder examples. The preferred method is to use
# create-k8s-secrets.sh which handles all secrets and configmaps.
#
#   cd deploy && ./create-k8s-secrets.sh ..
#
# Manual equivalents:
#
#   kubectl create secret generic auth-db-secret       --from-env-file=../.env.auth-db          -n bidder
#   kubectl create secret generic auth-service-secret   --from-env-file=../.env.auth-service.secret -n bidder
#   kubectl create secret generic users-db-secret       --from-env-file=../.env.users-db         -n bidder
#   kubectl create secret generic user-service-secret   --from-env-file=../.env.user-service.secret -n bidder
#   kubectl create secret generic policy-db-secret      --from-env-file=../.env.policy-db        -n bidder
#   kubectl create secret generic policy-service-secret --from-env-file=../.env.policy-service.secret -n bidder
#   kubectl create secret generic bids-service-secret   --from-env-file=../.env.bids-service.secret -n bidder
#   kubectl create secret generic traefik-secret        --from-env-file=../.env.traefik          -n bidder
#
# The shared config (non-secret values) is loaded as a ConfigMap:
#
#   kubectl create configmap shared-config              --from-env-file=../.env.shared.config    -n bidder
#   kubectl create configmap bidder-frontend-config     --from-env-file=../.env.bidder-frontend  -n bidder
