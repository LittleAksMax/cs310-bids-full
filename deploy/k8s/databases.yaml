# Databases and caches - Deployments with PVC-backed persistent storage.
# Host paths are parameterised in volumes.yaml.
---
# auth_db (Postgres)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-db
  namespace: bidder
  labels:
    app: auth-db
    network: bids-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
        network: bids-backend
    spec:
      containers:
        - name: auth-db
          image: postgres:17 # pinned, not 'latest'
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: auth-db-secret
          volumeMounts:
            - name: auth-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: auth-db-data
          persistentVolumeClaim:
            claimName: auth-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: bidder
spec:
  selector:
    app: auth-db
  ports:
    - port: 5432
      targetPort: 5432

