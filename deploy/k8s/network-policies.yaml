# NetworkPolicies map the Docker Compose networks to K8S.
# bids_backend -> backend services, databases, caches, traefik
# bids_frontend -> frontend + traefik only
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bids-backend
  namespace: bidder
spec:
  podSelector:
    matchLabels:
      network: bids-backend
  ingress:
    - from:
        - podSelector:
            matchLabels:
              network: bids-backend
  egress:
    - to:
        - podSelector:
            matchLabels:
              network: bids-backend
    # Allow DNS resolution
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bids-frontend
  namespace: bidder
spec:
  podSelector:
    matchLabels:
      network: bids-frontend
  ingress:
    - from:
        - podSelector:
            matchLabels:
              network: bids-frontend
  egress:
    - to:
        - podSelector:
            matchLabels:
              network: bids-frontend
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
