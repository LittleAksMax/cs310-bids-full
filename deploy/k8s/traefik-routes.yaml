# Traefik dynamic routing config for K8S.
# The Host() rules use the domain from values.yaml.
# Replace ${BACKEND_DOMAIN} with your actual production API domain.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-dynamic-config
  namespace: bidder
data:
  auth-routes.yml: |
    http:
      routers:
        auth-router:
          rule: "Host(`${BACKEND_DOMAIN}`) && (PathPrefix(`/auth/register`) || PathPrefix(`/auth/login`) || PathPrefix(`/auth/logout`) || PathPrefix(`/auth/refresh`) || Path(`/auth/health`))"
          service: auth_service
          entryPoints:
            - web
          middlewares:
            - auth-health-rewrite
      middlewares:
        auth-health-rewrite:
          replacePathRegex:
            regex: "^/auth/health$"
            replacement: "/health"
      services:
        auth_service:
          loadBalancer:
            servers:
              - url: "http://auth-service.bidder.svc.cluster.local:8080"

  policy-routes.yml: |
    http:
      routers:
        policy-router:
          rule: "Host(`${BACKEND_DOMAIN}`) && (PathPrefix(`/policies`) || PathPrefix(`/policies/health`) || PathPrefix(`/internal/policies`) || PathPrefix(`/convert`))"
          service: policy_service
          entryPoints:
            - web
          middlewares:
            - auth-header-transform
            - policy-health-rewrite
            - policy-internal-rewrite
      middlewares:
        policy-health-rewrite:
          replacePathRegex:
            regex: "^/policies/health$"
            replacement: "/health"
        policy-internal-rewrite:
          replacePathRegex:
            regex: "^/internal/policies(.*)$"
            replacement: "/internal$1"
      services:
        policy_service:
          loadBalancer:
            servers:
              - url: "http://policy-service.bidder.svc.cluster.local:8080"

  user-routes.yml: |
    http:
      routers:
        users-router:
          rule: "Host(`${BACKEND_DOMAIN}`) && (PathPrefix(`/user`) || PathPrefix(`/user/health`) || PathPrefix(`/internal/users`) || PathPrefix(`/lwa`))"
          service: users_service
          entryPoints:
            - web
          middlewares:
            - auth-header-transform
            - users-health-rewrite
            - users-internal-rewrite
      middlewares:
        users-health-rewrite:
          replacePathRegex:
            regex: "^/user/health$"
            replacement: "/health"
        users-internal-rewrite:
          replacePathRegex:
            regex: "^/internal/users(.*)$"
            replacement: "/internal$1"
      services:
        users_service:
          loadBalancer:
            servers:
              - url: "http://user-service.bidder.svc.cluster.local:8080"

  custom-middlewares.yml: |
    http:
      middlewares:
        auth-header-transform:
          plugin:
            authheader:
              sharedSecretEnvVar: "X_AUTH_SIG_SECRET"
              authHeaderPrefix: "Bearer "
