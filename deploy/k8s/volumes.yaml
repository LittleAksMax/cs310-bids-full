# PersistentVolumes with parameterised hostPath for dev machines.
# Substitute the ${..._HOST_PATH} variables with envsubst before applying.
#
# Usage:
#   export AUTH_DB_HOST_PATH=/data/bidder/postgres/auth_db
#   export USERS_DB_HOST_PATH=/data/bidder/postgres/users_db
#   export POLICY_DB_HOST_PATH=/data/bidder/policy_db
#   export POLICY_CACHE_HOST_PATH=/data/bidder/redis/policy_cache
#   export USERS_CACHE_HOST_PATH=/data/bidder/redis/users_cache
#   envsubst < k8s/volumes.yaml | kubectl apply -f -
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: auth-db-pv
  labels:
    app: auth-db
spec:
  capacity:
    storage: 1Gi
  accessModes: ["ReadWriteOnce"]
  hostPath:
    path: "${AUTH_DB_HOST_PATH}"
    type: DirectoryOrCreate
  storageClassName: manual
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: auth-db-pvc
  namespace: bidder
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: manual
  resources:
    requests:
      storage: 1Gi
  selector:
    matchLabels:
      app: auth-db

